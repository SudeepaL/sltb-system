{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver & Conductor confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/bus_dashboard.css' %}">
    <style>
        .confirm-shell {
            max-width: 760px;
            margin: 34px auto;
            background: #efefef;
            border: 1px solid #d0d0d0;
            border-radius: 12px;
            padding: 28px;
        }
        .confirm-title {
            font-size: 44px;
            font-weight: 800;
            color: #0a2b76;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<header class="top-area">
    <img src="{% static 'core/logo.jpg' %}" alt="SLTB Logo" class="logo">
    <nav class="module-nav">
        <div class="module-buttons">
            {% for item in module_buttons %}
                <a href="{{ item.url }}" class="module-btn {% if item.is_active %}active{% endif %}">{{ item.label }}</a>
            {% endfor %}
        </div>
    </nav>
</header>

<main class="confirm-shell shadow-sm">
    <h1 class="confirm-title">Driver &amp; Conductor confirmation</h1>
    <p class="mb-4"><strong>Bus Code:</strong> {{ bus.bus_code }}</p>

    {% if error_message %}
        <div class="alert alert-danger">{{ error_message }}</div>
    {% endif %}

    <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-12">
            <label class="form-label" for="driver_nic">Driver NIC</label>
            <input id="driver_nic" name="driver_nic" type="text" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label" for="conductor_nic">Conductor NIC</label>
            <input id="conductor_nic" name="conductor_nic" type="text" class="form-control" required>
        </div>
        <div class="col-12">
            <button type="submit" class="manage-btn">Confirm &amp; Enter</button>
        </div>
    </form>
</main>
</body>
</html>
