{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Bus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/bus_dashboard.css' %}">
</head>
<body>
<header class="top-area">
    <img src="{% static 'core/logo.jpg' %}" alt="SLTB Logo" class="logo">
    <nav class="module-nav">
        <div class="module-buttons">
           {% for item in module_buttons %}
                <a href="{{ item.url }}" class="module-btn {% if item.is_active %}active{% endif %}">{{ item.label }}</a>
            {% endfor %}
        </div>
    </nav>
</header>

<main class="manage-page">
    <h1 class="panel-title"><strong>Add New Bus</strong></h1>
    <form method="post" enctype="multipart/form-data" class="manage-form form-shell">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="manage-actions">
            <button type="submit" class="manage-btn">Create Bus</button>
            <a href="{% url 'bus_dashboard' %}" class="module-btn">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
